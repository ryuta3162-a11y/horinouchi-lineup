<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT365 京王堀之内 - マシンラインナップ</title>
    
    <!-- Google Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fitpink: '#f05b82',
                        fitlightpink: '#fdf2f5',
                        fitdark: '#333333',     
                        fitgray: '#f4f4f5',
                        fityellow: '#fbbf24',   
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* ベース設定 */
        html { scroll-behavior: smooth; background-color: #f4f4f5; color: #333333; }
        body { font-family: 'Noto Sans JP', sans-serif; }

        /* スクロールバー非表示 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- アニメーション --- */
        @keyframes popUpFade {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-pop-up {
            opacity: 0;
            animation: popUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* --- ラメ・光沢感（シャイニー）テキストエフェクト --- */
        @keyframes shine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }
        
        /* 白飛び防止：親要素に影をつけて全体を浮き上がらせる */
        .shiny-text-wrapper {
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15)) drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        /* ピンクの光沢グラデーション（少し濃いめに設定） */
        .shiny-text-pink {
            background-image: 
                linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.9) 45%, transparent 60%),
                linear-gradient(to bottom, #f05b82 0%, #c42d55 100%);
            background-size: 200% auto, auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 4s infinite linear;
            -webkit-text-stroke: 1px rgba(240, 91, 130, 0.3); /* 輪郭を強調 */
        }
        
        /* ダークグレーの光沢グラデーション */
        .shiny-text-dark {
            background-image: 
                linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.8) 45%, transparent 60%),
                linear-gradient(to bottom, #4b5563 0%, #111827 100%);
            background-size: 200% auto, auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 4s infinite linear;
            -webkit-text-stroke: 1px rgba(17, 24, 39, 0.3);
        }

        /* --- モダン＆スポーティな番号バッジ --- */
        .modern-badge {
            font-family: 'Helvetica Neue', Arial, sans-serif; /* 数字がシャープになる英字フォント */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 900;
            color: #ffffff;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.3), 0 2px 5px rgba(0,0,0,0.15);
        }
        /* 数字を視覚的に完全にど真ん中に配置するための微調整 */
        .modern-badge span {
            display: block;
            line-height: 1;
            transform: translateY(1px); 
            letter-spacing: -0.05em;
            margin-right: -0.05em; /* センタリングの微調整 */
        }

        /* --- マシンカード --- */
        .machine-card {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            background: #ffffff;
            border-radius: 12px; 
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .machine-card.show { opacity: 1; transform: translateY(0); }

        .img-blend {
            mix-blend-mode: multiply; 
        }

        /* HUD風サイドメニューボタン (可愛いスタイル) */
        .menu-btn-active {
            background-color: #fdf2f5 !important; /* 薄いピンク背景 */
            border-color: #f05b82 !important;
            color: #f05b82 !important;
            box-shadow: 0 4px 10px rgba(240, 91, 130, 0.15);
        }
    </style>
</head>

            <div id="machine-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6 relative z-10">
                <!-- JSで生成 -->
            </div>
        </div>
    </main>

    <script>
        // 画像読み込みエラー処理
        window.handleImageError = function(imgElement) {
            const exts = ['.jpg', '.png', '.webp', '.jpeg', '.JPG', '.PNG'];
            let currentIndex = parseInt(imgElement.getAttribute('data-ext-index') || '0');
            currentIndex++;
            
            if (currentIndex < exts.length) {
                imgElement.setAttribute('data-ext-index', currentIndex);
                const baseName = imgElement.getAttribute('data-basename');
                imgElement.src = `${baseName}${exts[currentIndex]}`; 
            } else {
                imgElement.onerror = null;
                imgElement.src = 'https://placehold.co/400x400/eeeeee/999999?text=NO+IMAGE&font=Noto+Sans+JP';
            }
        };

                { name: 'ステアクライマー', count: '1', imgBase: 'l-stair-climber' },

            ]},
            { id: 'premium', title: 'プレミアムルーム', items: [
                { name: 'タンニングマシン', count: '1', imgBase: 'tanning' },
                { name: '脱毛マシン', count: '1', imgBase: 'hair-removal' },
                { name: 'プロテインサーバー', count: '1', imgBase: 'wellness-server' },
                { name: 'マッサージチェア', count: '4', imgBase: 'massage-chair' },
                { name: '温熱機器ハーフドーム', count: '2', imgBase: 'half-dome-2' },
                { name: 'コワーキングスペース', count: '式', imgBase: 'coworking-space' }
            ]}
        ];

        const menuContainer = document.getElementById('area-menu');
        const gridContainer = document.getElementById('machine-grid');
        const titleContainer = document.getElementById('current-area-title');
        
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const openBtn = document.getElementById('open-sidebar-btn');
        const closeBtn = document.getElementById('close-sidebar-btn');

        let currentActiveId = null;

        function toggleSidebar(show) {
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                if (window.innerWidth >= 768) {
                    mainContent.classList.add('ml-64');
                    mainContent.classList.remove('ml-0');
                }
                openBtn.classList.add('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                mainContent.classList.remove('ml-64');
                mainContent.classList.add('ml-0');
                openBtn.classList.remove('hidden');
            }
        }

        openBtn.addEventListener('click', () => toggleSidebar(true));
        closeBtn.addEventListener('click', () => toggleSidebar(false));

        if (window.innerWidth < 768) toggleSidebar(false);

        function buildMenu() {
            gymData.forEach((area, index) => {
                const btn = document.createElement('button');
                btn.className = `w-full block focus:outline-none mb-3 rounded-full transition-all duration-300 relative group bg-white border-2 border-gray-100 text-gray-500 hover:border-fitpink`;
                
                // 「01」「02」フォーマット
                const numText = String(index + 1).padStart(2, '0');
                
                btn.innerHTML = `
                    <div class="relative z-10 px-2 py-2 flex items-center justify-start gap-3 transition-colors duration-300">
                        <div class="menu-num w-8 h-8 modern-badge text-sm transition-all duration-300 flex-shrink-0" style="background-color: #333333;">
                            <span>${numText}</span>
                        </div>
                        <span class="text-xs md:text-sm font-bold tracking-widest transition-colors duration-300 text-left">${area.title}</span>
                    </div>
                `;
                
                btn.onclick = () => selectArea(area.id, btn, index);
                menuContainer.appendChild(btn);

                if (index === 0) selectArea(area.id, btn, index);
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function selectArea(id, selectedBtn, index) {
            if (currentActiveId === id) return;
            currentActiveId = id;

            // メニューボタンの切り替え（アクティブ時はピンク背景）
            const allBtns = menuContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                const numBadge = btn.querySelector('.menu-num');
                if (btn === selectedBtn) {
                    btn.classList.add('menu-btn-active');
                    btn.classList.remove('border-gray-100');
                    numBadge.style.backgroundColor = '#f05b82'; // FITピンク
                    numBadge.style.transform = 'scale(1.1)';
                } else {
                    btn.classList.remove('menu-btn-active');
                    btn.classList.add('border-gray-100');
                    numBadge.style.backgroundColor = '#333333'; // ダークグレー
                    numBadge.style.transform = 'scale(1)';
                }
            });

            const areaData = gymData.find(a => a.id === id);
            
            titleContainer.parentElement.style.opacity = '0';
            setTimeout(() => {
                const numText = String(index + 1).padStart(2, '0');
                // タイトルにモダンな番号アイコンを追加
                titleContainer.innerHTML = `
                    <div class="w-8 h-8 md:w-10 md:h-10 modern-badge text-sm md:text-lg flex-shrink-0" style="background-color: #f05b82;">
                        <span>${numText}</span>
                    </div>
                    <span>${areaData.title}</span>
                `;
                titleContainer.parentElement.style.opacity = '1';
            }, 200);

            gridContainer.innerHTML = '';

            areaData.items.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `machine-card flex flex-col group cursor-default border border-gray-100 hover:border-fitpink hover:shadow-lg transition-all duration-300`;

                let badgeHTML = '';
                if (item.count && item.count !== '式') {
                    const countText = item.count.includes('迄') ? item.count : `${item.count} 台`;
                    badgeHTML = `
                        <!-- 丸みを帯びた可愛いバッジ -->
                        <div class="absolute top-2 right-2 z-20">
                            <div class="text-white text-[10px] md:text-xs font-bold px-2 py-1 rounded-full bg-fitpink shadow-sm">
                                <span class="tracking-wider">${countText}</span>
                            </div>
                        </div>
                    `;
                }

                let imgHTML = '';
                if (item.imgBase) {
                    imgHTML = `<img src="${item.imgBase}.jpg" alt="${item.name}" data-basename="${item.imgBase}" data-ext-index="0" onerror="handleImageError(this)" class="w-full h-full object-contain p-2 img-blend group-hover:scale-105 transition-transform duration-500 ease-out relative z-10">`;
                } else {
                    imgHTML = `<img src="https://placehold.co/400x400/eeeeee/999999?text=NO+IMAGE&font=Noto+Sans+JP" alt="${item.name}" class="w-full h-full object-contain p-2 group-hover:scale-105 transition-transform duration-500 ease-out z-10">`;
                }

                card.innerHTML = `
                    <div class="relative aspect-square flex items-center justify-center bg-fitgray rounded-t-xl overflow-hidden">
                        ${imgHTML}
                        ${badgeHTML}
                    </div>
                    
                    <div class="p-3 bg-white flex-grow flex items-center justify-center rounded-b-xl">
                        <h4 class="font-bold text-fitdark text-[11px] md:text-sm tracking-widest text-center leading-tight group-hover:text-fitpink transition-colors duration-300">${item.name}</h4>
                    </div>
                `;

                gridContainer.appendChild(card);
                setTimeout(() => card.classList.add('show'), 30 * idx);
            });
        }

        document.addEventListener('DOMContentLoaded', buildMenu);
    </script>
