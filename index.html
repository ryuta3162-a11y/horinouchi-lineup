<!DOCTYPE html>

    <!-- Google Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fitpink: '#f05b82',
                        fitdark: '#0a0a0c', // より深い黒（サイバー感）
                        fitgray: '#f0f0f5',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* スムーススクロールとベース背景 */
        html { scroll-behavior: smooth; background-color: #f4f4f8; }

        /* スクロールバー非表示 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- サイバー系 背景パターン --- */
        .bg-cyber-grid {
            background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .bg-dot-pattern {
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- スキャンライン（走査線） --- */
        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.03) 50%,
                rgba(0,0,0,0.03)
            );
            background-size: 100% 4px;
        }

        /* --- サイバー風 アニメーション --- */
        @keyframes strokeDash {
            0% { -webkit-text-stroke: 1px transparent; color: transparent; transform: translateZ(0) translateY(20px); opacity: 0;}
            30% { -webkit-text-stroke: 2px rgba(255,255,255,0.8); color: transparent; transform: translateZ(50px) translateY(0); opacity: 1;}
            100% { -webkit-text-stroke: 0px transparent; color: #fff; transform: translateZ(0);}
        }
        .animate-hero-text {
            animation: strokeDash 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }
        
        @keyframes popUpFade {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-pop-up {
            opacity: 0;
            animation: popUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* --- マシンカード（シャープ＆ネオン発光） --- */
        .machine-card {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 4px; /* 角をシャープに */
        }
        .machine-card.show {
            opacity: 1;
            transform: translateY(0);
        }
        .cyber-hover {
            transition: all 0.3s ease;
        }
        .cyber-hover:hover {
            transform: translateY(-4px);
            z-index: 30;
            /* box-shadowとborder-colorはJSでエリアカラーを動的付与 */
        }
        
        /* 画像の馴染ませ */
        .img-blend {
            mix-blend-mode: multiply;
        }

        /* --- HUD風タイトルボックス --- */
        .hud-title-box {
            position: relative;
            padding: 0.5rem 2rem 0.5rem 1.5rem;
            background: linear-gradient(90deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 100%);
            border-left: 4px solid;
            border-bottom: 1px solid;
            /* 枠の色と影はJSで付与 */
        }
        .hud-title-box::after {
            content: '';
            position: absolute;
            bottom: -1px;
            right: 0;
            width: 40px;
            height: 1px;
            background-color: currentColor;
            box-shadow: 0 0 8px currentColor;
        }
    </style>
</head>

        // 画像読み込みエラー処理
        window.handleImageError = function(imgElement) {
            const exts = ['.jpg', '.png', '.webp', '.jpeg', '.JPG', '.PNG'];
            let currentIndex = parseInt(imgElement.getAttribute('data-ext-index') || '0');
            currentIndex++;
            
            if (currentIndex < exts.length) {
                imgElement.setAttribute('data-ext-index', currentIndex);
                const baseName = imgElement.getAttribute('data-basename');
                imgElement.src = `${baseName}${exts[currentIndex]}`; 
            } else {
                imgElement.onerror = null;
                imgElement.src = 'https://placehold.co/400x400/eeeeee/999999?text=NO+IMAGE&font=Noto+Sans+JP';

                    { name: '脱毛マシン', count: '1', imgBase: 'hair-removal' },
                    { name: 'プロテインサーバー', count: '1', imgBase: 'wellness-server' },
                    { name: 'マッサージチェア', count: '4', imgBase: 'massage-chair' },
                    { name: '温熱機器ハーフドーム', count: '2', imgBase: 'half-dome-2' },
                    { name: 'コワーキングスペース', count: '式', imgBase: 'coworking-space' }
                ]
            }
        ];

        const menuContainer = document.getElementById('area-menu');
        const gridContainer = document.getElementById('machine-grid');
        const titleContainer = document.getElementById('current-area-title');
        const titleBox = document.getElementById('title-box');
        
        // サイドバー制御
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const openBtn = document.getElementById('open-sidebar-btn');
        const closeBtn = document.getElementById('close-sidebar-btn');

        let currentActiveId = null;

        function toggleSidebar(show) {
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                if (window.innerWidth >= 768) {
                    mainContent.classList.add('ml-64');
                    mainContent.classList.remove('ml-0');
                }
                openBtn.classList.add('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                mainContent.classList.remove('ml-64');
                mainContent.classList.add('ml-0');
                openBtn.classList.remove('hidden');
            }
        }

        openBtn.addEventListener('click', () => toggleSidebar(true));
        closeBtn.addEventListener('click', () => toggleSidebar(false));

        if (window.innerWidth < 768) {
            toggleSidebar(false);
        }

        function buildMenu() {
            gymData.forEach((area, index) => {
                const btn = document.createElement('button');
                // シャープなメニューボタンデザイン
                btn.className = `w-full block focus:outline-none mb-2 transition-all duration-300 relative group bg-white border border-gray-200 rounded-sm`;
                
                btn.innerHTML = `
                    <div class="menu-indicator absolute left-0 top-0 bottom-0 w-1 transition-all duration-300" style="background-color: ${area.color}; opacity: 0.3;"></div>
                    <div class="menu-bg absolute inset-0 transition-opacity duration-300 opacity-0 group-hover:opacity-10" style="background-color: ${area.color};"></div>
                    
                    <div class="menu-btn-content relative z-10 px-4 py-3 flex items-center justify-between transition-colors duration-300">
                        <span class="text-xs md:text-sm font-black tracking-widest uppercase transition-colors duration-300 text-gray-500">${area.title}</span>
                        <i data-lucide="chevron-right" class="menu-icon w-4 h-4 opacity-0 group-hover:opacity-100 transition-all transform -translate-x-2 group-hover:translate-x-0" style="color: ${area.color};"></i>
                    </div>
                `;
                
                btn.onclick = () => selectArea(area.id, btn, area.color);
                menuContainer.appendChild(btn);

                if (index === 0) {
                    selectArea(area.id, btn, area.color);
                }
            });
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        function selectArea(id, selectedBtn, color) {
            if (currentActiveId === id) return;
            currentActiveId = id;

            // メニューのアクティブ状態の切り替え（サイバーな点灯）
            const allBtns = menuContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                const indicator = btn.querySelector('.menu-indicator');
                const bg = btn.querySelector('.menu-bg');
                const span = btn.querySelector('span');
                const icon = btn.querySelector('.menu-icon');

                if (btn === selectedBtn) {
                    indicator.style.opacity = '1';
                    indicator.style.width = '4px';
                    bg.style.opacity = '0.1';
                    span.style.color = color;
                    icon.style.opacity = '1';
                    icon.style.transform = 'translateX(0)';
                    btn.style.borderColor = color;
                    btn.classList.add('shadow-[0_2px_8px_rgba(0,0,0,0.05)]');
                } else {
                    indicator.style.opacity = '0.3';
                    indicator.style.width = '2px';
                    bg.style.opacity = '0';
                    span.style.color = '#6b7280'; // gray-500
                    icon.style.opacity = '0';
                    icon.style.transform = 'translateX(-8px)';
                    btn.style.borderColor = '#e5e7eb'; // gray-200
                    btn.classList.remove('shadow-[0_2px_8px_rgba(0,0,0,0.05)]');
                }
            });

            const areaData = gymData.find(a => a.id === id);
            
            // HUD風タイトルの色と影の切り替え
            titleContainer.style.opacity = '0';
            titleContainer.style.transform = 'translateY(-10px)';
            
            setTimeout(() => {
                titleContainer.innerHTML = areaData.title;
                titleContainer.style.color = areaData.color;
                
                titleBox.style.borderLeftColor = areaData.color;
                titleBox.style.borderBottomColor = areaData.color;
                titleBox.style.color = areaData.color; // ::afterの影用
                // 内側に淡く光るグラデーション
                titleBox.style.boxShadow = `inset 0 -15px 15px -15px ${areaData.color}30`;
                
                titleContainer.style.opacity = '1';
                titleContainer.style.transform = 'translateY(0)';
            }, 200);

            gridContainer.innerHTML = '';

            // マシンカードの生成 (スマホ時は2列を想定したサイズ調整)
            areaData.items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `machine-card cyber-hover bg-white p-2 md:p-3 flex flex-col group cursor-default border border-gray-200`;

                // JSから動的にホバー時のネオン効果を付与
                card.onmouseenter = () => { 
                    card.style.borderColor = areaData.color; 
                    card.style.boxShadow = `0 0 15px ${areaData.color}40, 0 4px 6px -1px rgba(0,0,0,0.1)`; 
                };
                card.onmouseleave = () => { 
                    card.style.borderColor = '#e5e7eb'; 
                    card.style.boxShadow = 'none'; 
                };

                const countText = item.count.includes('迄') || item.count === '式' ? item.count : `${item.count} 台`;

                let imgHTML = '';
                if (item.imgBase) {
                    imgHTML = `<img src="${item.imgBase}.jpg" alt="${item.name}" data-basename="${item.imgBase}" data-ext-index="0" onerror="handleImageError(this)" class="w-full h-full object-contain p-1.5 md:p-2 img-blend group-hover:scale-110 transition-transform duration-500 ease-out">`;
                } else {
                    imgHTML = `<img src="https://placehold.co/400x400/f0f0f0/cccccc?text=NO+IMAGE&font=Noto+Sans+JP" alt="${item.name}" class="w-full h-full object-contain p-1.5 md:p-2 mix-blend-darken group-hover:scale-105 transition-transform duration-500 ease-out">`;
                }

                card.innerHTML = `
                    <div class="relative aspect-square mb-2 md:mb-3 overflow-hidden flex items-center justify-center bg-[#f8f9fa] border border-gray-100 rounded-sm">
                        <!-- モニターの走査線（スキャンライン）エフェクト -->
                        <div class="absolute inset-0 scanlines z-10 pointer-events-none"></div>
                        
                        <div class="relative z-0 w-full h-full flex items-center justify-center p-1 md:p-2">
                            ${imgHTML}
                        </div>
                        
                        <!-- サイバー風の斜めバッジ -->
                        <div class="absolute top-1 right-1 md:top-2 md:right-2 z-20">
                            <div class="text-white text-[9px] md:text-xs font-black px-1.5 md:px-2 py-0.5 transform -skew-x-12" style="background-color: ${areaData.color}; box-shadow: 0 0 5px ${areaData.color}80;">
                                <span class="inline-block transform skew-x-12 tracking-wider">${countText}</span>
                            </div>
                        </div>
                    </div>
                    <!-- テキストサイズを小さく調整し、2列でも収まるように -->
                    <div class="flex-grow flex items-center justify-center z-10 px-1">
                        <h4 class="font-black text-gray-800 text-[10px] md:text-sm tracking-tight leading-tight text-center transition-colors duration-300" style="group-hover:color: ${areaData.color};">${item.name}</h4>
                    </div>
                `;
                gridContainer.appendChild(card);

                // 時間差出現
                setTimeout(() => {
                    card.classList.add('show');
                }, 40 * index);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            buildMenu();
        });
    </script>
</body>
</html>
