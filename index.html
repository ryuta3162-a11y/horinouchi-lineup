<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT365 京王堀之内 - マシンラインナップ</title>
    
    <!-- Google Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fitpink: '#f05b82',
                        fitdark: '#08080a', 
                        fitgray: '#f4f4f8',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* ベース設定 */
        html { scroll-behavior: smooth; background-color: #08080a; color: #ffffff; }
        body { font-family: 'Noto Sans JP', sans-serif; }

        /* スクロールバー非表示 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- サイバー系背景パターン --- */
        .bg-cyber-grid {
            background-image: linear-gradient(rgba(240, 91, 130, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(240, 91, 130, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- アニメーション --- */
        @keyframes neonPulse {
            0%, 100% { opacity: 0.8; filter: blur(2px); }
            50% { opacity: 1; filter: blur(4px); }
        }
        .animate-neon {
            animation: neonPulse 2s infinite ease-in-out;
        }

        @keyframes strokeDash {
            0% { -webkit-text-stroke: 1px rgba(255,255,255,0.3); color: transparent; transform: translateY(20px); opacity: 0;}
            50% { -webkit-text-stroke: 1px #fff; color: transparent; opacity: 1;}
            100% { -webkit-text-stroke: 0px transparent; color: #fff; transform: translateY(0);}
        }
        .animate-hero-text {
            animation: strokeDash 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        /* --- マシンカード（高級サイバー） --- */
        .machine-card {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            background: #111114;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .machine-card.show { opacity: 1; transform: translateY(0); }

        /* スポットライト・オーバーレイ */
        .spotlight-overlay {
            background: linear-gradient(to bottom, rgba(255,255,255,0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        /* 画像の馴染ませ */
        .img-light-blend {
            filter: contrast(1.05) brightness(0.95);
            mix-blend-mode: screen; 
        }

        /* HUD風サイドメニューボタン */
        .menu-btn-active {
            box-shadow: inset 0 0 15px rgba(240, 91, 130, 0.2);
            border-right: 3px solid #f05b82;
        }

        /* ネオンバー（蛍光灯）エフェクト */
        .neon-bar {
            height: 2px;
            width: 80%;
            margin: 0 auto;
            position: absolute;
            top: 0;
            left: 10%;
            z-index: 20;
            border-radius: 0 0 4px 4px;
        }
    </style>
</head>
<body class="bg-fitdark flex min-h-screen overflow-x-hidden">

    <!-- メニューを開くボタン -->
    <button id="open-sidebar-btn" class="fixed top-4 left-4 z-[60] bg-white/10 backdrop-blur-md text-white p-3 rounded-sm border border-white/20 hover:border-fitpink transition-all duration-300 hidden group shadow-[0_0_20px_rgba(0,0,0,0.5)]">
        <i data-lucide="menu" class="w-6 h-6 transform group-hover:scale-110 transition-transform"></i>
    </button>

    <!-- 左側：サイドメニュー -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-[#0c0c0f] border-r border-white/5 z-[70] overflow-y-auto no-scrollbar shadow-2xl flex flex-col transition-transform duration-500 ease-in-out">
        <!-- 閉じるボタン -->
        <button id="close-sidebar-btn" class="absolute top-4 right-4 text-white/40 hover:text-white bg-white/5 hover:bg-white/10 rounded-sm p-1.5 transition-colors duration-300">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>

        <div class="h-1 bg-fitpink w-full flex-shrink-0 shadow-[0_0_15px_#f05b82]"></div>
        
        <div class="pt-10 pb-6 flex items-center justify-center flex-shrink-0">
            <span class="text-[10px] font-black text-white/30 tracking-[0.4em] uppercase">Machine Navigation</span>
        </div>
        
        <nav id="area-menu" class="flex flex-col flex-grow p-4 gap-3">
            <!-- JSで生成 -->
        </nav>
    </aside>

    <!-- 右側：メインコンテンツ -->
    <main id="main-content" class="ml-64 flex-1 min-w-0 flex flex-col transition-all duration-500 ease-in-out relative z-10">
        
        <!-- ヒーローセクション -->
        <div class="relative w-full bg-[#050507] py-16 md:py-28 px-4 flex flex-col items-center justify-center border-b border-white/5 overflow-hidden shadow-2xl z-20">
            <div class="absolute inset-0 bg-cyber-grid opacity-30"></div>
            
            <div class="relative z-30 animate-pop-up mb-8">
                <!-- 施設名を漢字表記に修正 -->
                <span class="text-fitpink font-black text-[10px] md:text-sm tracking-[0.5em] uppercase border-b border-fitpink/50 pb-2">FIT365　京王堀之内</span>
            </div>
            
            <h2 class="relative z-30 text-5xl sm:text-7xl lg:text-[9rem] font-black leading-[0.85] tracking-tighter uppercase mb-10 text-center">
                <span class="block animate-hero-text">GRAND</span>
                <span class="block animate-hero-text text-fitpink drop-shadow-[0_0_30px_rgba(240,91,130,0.6)]" style="animation-delay: 0.1s;">OPENING</span>
            </h2>
            
            <div class="relative z-30 animate-pop-up flex items-center justify-center gap-6 mt-2" style="animation-delay: 0.4s;">
                <div class="h-[1px] w-12 md:w-20 bg-gradient-to-r from-transparent via-white/50 to-transparent"></div>
                <span class="text-white/90 font-black text-2xl md:text-4xl tracking-[0.3em]">4.1 WED</span>
                <div class="h-[1px] w-12 md:w-20 bg-gradient-to-r from-transparent via-white/50 to-transparent"></div>
            </div>
        </div>

        <!-- マシン表示エリア -->
        <div class="px-3 md:px-10 lg:px-16 py-12 md:py-20 relative z-10">
            
            <!-- エリアタイトル (HUDスタイル) -->
            <div class="mb-12 md:mb-16 flex justify-center">
                <div id="title-box" class="relative px-12 py-4 border-l-4 border-r-4 transition-all duration-500 flex flex-col items-center">
                    <span id="title-label" class="text-[9px] font-black tracking-[0.4em] uppercase mb-2 opacity-50">Current Sector</span>
                    <h2 id="current-area-title" class="text-3xl md:text-5xl lg:text-6xl font-black tracking-widest transition-colors duration-300 uppercase text-center">
                        <!-- JSで挿入 -->
                    </h2>
                </div>
            </div>
            
            <!-- マシングリッド (スマホ2列固定) -->
            <div id="machine-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-6 relative z-10">
                <!-- JSで生成 -->
            </div>
        </div>
    </main>

    <script>
        // 画像読み込みエラー処理
        window.handleImageError = function(imgElement) {
            const exts = ['.jpg', '.png', '.webp', '.jpeg', '.JPG', '.PNG'];
            let currentIndex = parseInt(imgElement.getAttribute('data-ext-index') || '0');
            currentIndex++;
            
            if (currentIndex < exts.length) {
                imgElement.setAttribute('data-ext-index', currentIndex);
                const baseName = imgElement.getAttribute('data-basename');
                imgElement.src = `${baseName}${exts[currentIndex]}`; 
            } else {
                imgElement.onerror = null;
                imgElement.src = 'https://placehold.co/400x400/1a1a1d/3a3a3c?text=COMING+SOON&font=Noto+Sans+JP';
            }
        };

        const gymData = [
            { id: 'cardio', title: '有酸素エリア', color: '#3b82f6', items: [
                { name: 'トレッドミル', count: '20', imgBase: 'treadmill' },
                { name: 'エリプティカルトレーナー', count: '4', imgBase: 'elliptical-trainer' },
                { name: 'ステアクライマー', count: '2', imgBase: 'stair-climber' },
                { name: 'リカンベントバイク', count: '2', imgBase: 'recumbent-bike' },
                { name: 'アップライトバイク', count: '2', imgBase: 'upright-bike' }
            ]},
            { id: 'resistance', title: 'レジスタンスエリア', color: '#f97316', items: [
                { name: 'レッグエクステンション・カールコンボ', count: '1', imgBase: 'leg-extension-curl' },
                { name: 'レッグエクステンション', count: '1', imgBase: 'leg-extension' },
                { name: 'レッグカール', count: '1', imgBase: 'leg-curl' },
                { name: 'アブダクターアダクターコンボ', count: '1', imgBase: 'hip-abductor-adductor' },
                { name: 'レッグプレス', count: '2', imgBase: 'leg-press' },
                { name: 'プローンレッグカール', count: '1', imgBase: 'prone-leg-curl' },
                { name: 'アダクター', count: '1', imgBase: 'hip-abductor-adductor' },
                { name: 'アブダクター', count: '1', imgBase: 'hip-abductor' },
                { name: 'バイセプスカール', count: '2', imgBase: 'biceps-curl' },
                { name: 'アブドミナルクランチ', count: '2', imgBase: 'abdominal-crunch' },
                { name: 'ロータリートルソー', count: '1', imgBase: 'rotary-torso' },
                { name: 'ショルダープレス', count: '1', imgBase: 'shoulder-press' },
                { name: 'トライセプスエクステンション', count: '1', imgBase: 'triceps-press' },
                { name: 'ペックフライ＆リアコンボ', count: '2', imgBase: 'peck-fly-rear-combo' },
                { name: 'チェストプレス', count: '2', imgBase: 'chest-press' },
                { name: 'ラットプル＆シーテッドロー', count: '2', imgBase: 'lat-pull-seated-row-combo' },
                { name: 'ローロー', count: '2', imgBase: 'low-row' },
                { name: '8スタック', count: '1', imgBase: '8-stack' }
            ]},
            { id: 'freeweight', title: 'フリーウエイトエリア', color: '#ef4444', items: [
                { name: 'パワーラック', count: '6', imgBase: 'power-rack' },
                { name: 'スミスマシン', count: '2', imgBase: 'smith-machine' },
                { name: 'スーパースミスマシン', count: '1', imgBase: 'super-smith' },
                { name: 'ONI コンボラック', count: '2', imgBase: 'oni-combo-rack' },
                { name: 'オリンピックベンチ', count: '1', imgBase: 'olympic-bench' },
                { name: 'PLワイドチェストプレス', count: '1', imgBase: 'pl-wide-chest-press' },
                { name: 'PLインクラインプレス', count: '1', imgBase: 'pl-incline-press' },
                { name: 'PLディクラインプレス', count: '1', imgBase: 'decline-press' },
                { name: 'PLチェスト＆バック', count: '1', imgBase: 'pl-chest-back' },
                { name: 'PLラテラルレイズ', count: '1', imgBase: 'pl-lateral-raise' },
                { name: 'PLアイソラテラルショルダープレス', count: '1', imgBase: 'pl-shoulder-press' },
                { name: 'PLワイドプルダウン', count: '1', imgBase: 'pl-wide-pulldown' },
                { name: 'PLアイソラテラルハイロー', count: '1', imgBase: 'pl-high-row' },
                { name: 'PLアイソラテラルDYロー', count: '1', imgBase: 'pl-dy-row' },
                { name: 'PLアイソラテラルロー', count: '1', imgBase: 'iso-row' },
                { name: '45度レッグプレス', count: '1', imgBase: '45-leg-press' },
                { name: 'ハックスクワット', count: '1', imgBase: 'hack-squat' },
                { name: 'PLシーテッドカーフレイズ', count: '1', imgBase: 'pl-calf-raise' },
                { name: 'アシストチン', count: '1', imgBase: 'assist-chin' },
                { name: 'プリチャーカール', count: '1', imgBase: 'preacher-bench' },
                { name: 'ケーブルマシン', count: '3', imgBase: 'cable-machine' }
            ]},
            { id: 'ladies', title: 'レディースエリア', color: '#f05b82', items: [
                { name: 'トレッドミル', count: '4', imgBase: 'l-treadmill' },
                { name: 'エリプティカルトレーナー', count: '1', imgBase: 'l-elliptical' },
                { name: 'ステアクライマー', count: '1', imgBase: 'l-stair-climber' },
                { name: 'アップライトバイク', count: '2', imgBase: 'l-upright-bike' },
                { name: 'レッグプレス', count: '1', imgBase: 'l-leg-press' },
                { name: 'グルート', count: '1', imgBase: 'l-glute' },
                { name: 'レッグエクステンション/カール', count: '1', imgBase: 'l-leg-extension-curl-combo' },
                { name: 'ヒップアブダクター/アダクター', count: '1', imgBase: 'l-hip-abductor-adductor' },
                { name: 'アブ/ローバック', count: '1', imgBase: 'l-ab-low-back' },
                { name: 'チェストプレス', count: '1', imgBase: 'l-chest-press' },
                { name: 'ラットプル＆シーテッドロー', count: '1', imgBase: 'l-lat-pull-seated-row-combo' },
                { name: 'スミスマシン', count: '1', imgBase: 'l-smith-machine' }
            ]},
            { id: 'functional', title: 'ファンクショナル', color: '#eab308', items: [
                { name: 'ラダー', count: '1', imgBase: 'ladder' },
                { name: 'プライオBOX', count: '2', imgBase: 'plyo' },
                { name: 'ケトルベル', count: '式', imgBase: 'kettlebell' }, 
                { name: 'タンク', count: '1', imgBase: 'tank' },
                { name: 'ファンクショナルラック', count: '1', imgBase: 'functional-rack' },
                { name: 'YURAGI チェスト', count: '1', imgBase: 'yuragi-chest' },
                { name: 'YURAGI 2in1', count: '1', imgBase: 'yuragi-2in1' },
                { name: 'YURAGI アダクター', count: '1', imgBase: 'yuragi-adductor' },
                { name: 'ケーブル', count: '1', imgBase: 'cable' }
            ]},
            { id: 'premium', title: 'プレミアムルーム', color: '#a855f7', items: [
                { name: 'タンニングマシン', count: '1', imgBase: 'tanning' },
                { name: '脱毛マシン', count: '1', imgBase: 'hair-removal' },
                { name: 'プロテインサーバー', count: '1', imgBase: 'wellness-server' },
                { name: 'マッサージチェア', count: '4', imgBase: 'massage-chair' },
                { name: '温熱機器ハーフドーム', count: '2', imgBase: 'half-dome-2' },
                { name: 'コワーキングスペース', count: '式', imgBase: 'coworking-space' }
            ]}
        ];

        const menuContainer = document.getElementById('area-menu');
        const gridContainer = document.getElementById('machine-grid');
        const titleContainer = document.getElementById('current-area-title');
        const titleBox = document.getElementById('title-box');
        
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const openBtn = document.getElementById('open-sidebar-btn');
        const closeBtn = document.getElementById('close-sidebar-btn');

        let currentActiveId = null;

        function toggleSidebar(show) {
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                if (window.innerWidth >= 768) {
                    mainContent.classList.add('ml-64');
                    mainContent.classList.remove('ml-0');
                }
                openBtn.classList.add('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                mainContent.classList.remove('ml-64');
                mainContent.classList.add('ml-0');
                openBtn.classList.remove('hidden');
            }
        }

        openBtn.addEventListener('click', () => toggleSidebar(true));
        closeBtn.addEventListener('click', () => toggleSidebar(false));

        if (window.innerWidth < 768) toggleSidebar(false);

        function buildMenu() {
            gymData.forEach((area, index) => {
                const btn = document.createElement('button');
                btn.className = `w-full block focus:outline-none mb-2 transition-all duration-300 relative group py-4 px-6 border-l-2 border-white/5 text-left`;
                
                btn.innerHTML = `
                    <div class="relative z-10 flex items-center justify-between">
                        <span class="text-xs font-black tracking-[0.2em] uppercase transition-colors duration-300 text-white/40 group-hover:text-white">${area.title}</span>
                    </div>
                `;
                
                btn.onclick = () => selectArea(area.id, btn, area.color);
                menuContainer.appendChild(btn);

                if (index === 0) selectArea(area.id, btn, area.color);
            });
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function selectArea(id, selectedBtn, color) {
            if (currentActiveId === id) return;
            currentActiveId = id;

            const allBtns = menuContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                const span = btn.querySelector('span');
                if (btn === selectedBtn) {
                    btn.style.borderLeftColor = color;
                    btn.classList.add('menu-btn-active');
                    span.style.color = color;
                } else {
                    btn.style.borderLeftColor = 'transparent';
                    btn.classList.remove('menu-btn-active');
                    span.style.color = '';
                }
            });

            const areaData = gymData.find(a => a.id === id);
            
            titleContainer.style.opacity = '0';
            setTimeout(() => {
                titleContainer.innerHTML = areaData.title;
                titleContainer.style.color = color;
                titleBox.style.borderColor = `${color}40`;
                titleBox.style.boxShadow = `0 0 20px ${color}15`;
                titleContainer.style.opacity = '1';
            }, 200);

            gridContainer.innerHTML = '';

            areaData.items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `machine-card shadow-lg`;

                const countText = item.count.includes('迄') || item.count === '式' ? item.count : `${item.count} 台`;

                let imgHTML = '';
                if (item.imgBase) {
                    imgHTML = `<img src="${item.imgBase}.jpg" alt="${item.name}" data-basename="${item.imgBase}" data-ext-index="0" onerror="handleImageError(this)" class="w-full h-full object-contain p-2 img-light-blend group-hover:scale-110 transition-transform duration-700 ease-out relative z-10">`;
                } else {
                    imgHTML = `<img src="https://placehold.co/400x400/1a1a1d/3a3a3c?text=COMING+SOON&font=Noto+Sans+JP" alt="${item.name}" class="w-full h-full object-contain p-2 group-hover:scale-105 transition-transform duration-500 ease-out z-10">`;
                }

                card.innerHTML = `
                    <div class="neon-bar animate-neon" style="background-color: ${color}; box-shadow: 0 0 10px ${color};"></div>
                    
                    <div class="relative aspect-square flex items-center justify-center bg-[#0a0a0c]">
                        <div class="absolute inset-0 spotlight-overlay z-0" style="background: linear-gradient(to bottom, ${color}20 0%, transparent 50%);"></div>
                        
                        ${imgHTML}
                        
                        <div class="absolute top-2 right-2 z-20">
                            <div class="text-white text-[9px] font-black px-2 py-0.5" style="background-color: ${color}; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);">
                                <span class="tracking-wider">${countText}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-3 bg-[#111114] border-t border-white/5">
                        <h4 class="font-black text-white/90 text-[10px] md:text-xs tracking-widest text-center uppercase leading-tight group-hover:text-white transition-colors duration-300">${item.name}</h4>
                    </div>
                `;

                card.onmouseenter = () => {
                    card.style.boxShadow = `0 0 25px ${color}20`;
                    card.style.transform = 'translateY(-4px)';
                };
                card.onmouseleave = () => {
                    card.style.boxShadow = 'none';
                    card.style.transform = 'translateY(0)';
                };

                gridContainer.appendChild(card);
                setTimeout(() => card.classList.add('show'), 30 * index);
            });
        }

        document.addEventListener('DOMContentLoaded', buildMenu);
    </script>
</body>
</html>
